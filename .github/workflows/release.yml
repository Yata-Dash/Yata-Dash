name: release

# Cut a release by pushing a version tag (dev.ps1 → "Cut a release" does this):
#   git tag Beta-20260710 && git push origin Beta-20260710
# That builds the cross-platform binaries and creates the GitHub Release — all
# from the tagged commit. Docker/GHCR packages are built separately by their own
# auto-build workflow, so they are intentionally NOT built here.
on:
  push:
    tags:
      - 'Beta-*'

permissions:
  contents: write   # create the GitHub Release + upload the zips

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build

      - name: Build + package binaries
        run: bash scripts/package.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: dist/RELEASE_NOTES.md
          prerelease: true                 # beta builds aren't "Latest stable"
          fail_on_unmatched_files: true
