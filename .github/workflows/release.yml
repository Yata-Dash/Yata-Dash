name: release

# Cut a release by pushing a version tag (dev.ps1 → "Cut a release" does this):
#   git tag Beta-20260710 && git push origin Beta-20260710
# That builds the cross-platform binaries, builds & pushes the multi-arch Docker
# image to GHCR, and creates the GitHub Release — all from the tagged commit.
on:
  push:
    tags:
      - 'Beta-*'

permissions:
  contents: write   # create the GitHub Release + upload the zips
  packages: write   # push the image to GHCR (uses the built-in GITHUB_TOKEN)

jobs:
  binaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build frontend
        run: |
          cd web
          npm install
          npm run build

      - name: Build + package binaries
        run: bash scripts/package.sh "${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          body_path: dist/RELEASE_NOTES.md
          prerelease: true                 # beta builds aren't "Latest stable"
          fail_on_unmatched_files: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/yata
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=raw,value=latest

      - name: Build + push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
